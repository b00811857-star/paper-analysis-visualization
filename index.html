<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>论文数据趋势分析 - 按5天周期聚类</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        label {
            font-weight: 500;
            color: #333;
        }

        select, input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 16px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #eee;
        }

        .chart-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .details-section {
            margin-top: 30px;
        }

        .details-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .period-details {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .period-header {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }

        .category-item:last-child {
            border-bottom: none;
        }

        .category-name {
            color: #555;
            flex: 1;
        }

        .category-weight {
            color: #667eea;
            font-weight: bold;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .legend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 13px;
            gap: 8px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 22px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .control-group {
                flex-direction: column;
                align-items: stretch;
            }

            select, input, button {
                width: 100%;
            }

            .chart-container {
                height: 300px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }

        /* Category选择器样式 */
        .category-selector {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .category-selector-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid #eee;
            font-weight: bold;
            color: #333;
        }

        .category-selector-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .category-checkbox-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .category-checkbox-item:hover {
            background: #f0f0f0;
        }

        .category-checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
        }

        .category-checkbox-item label {
            flex: 1;
            cursor: pointer;
            margin: 0;
        }

        .category-selector-footer {
            display: flex;
            gap: 10px;
            padding: 15px;
            border-top: 1px solid #eee;
            background: #f9f9f9;
        }

        .category-selector-footer button {
            flex: 1;
        }

        /* Modal样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 90%;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid #eee;
        }

        .modal-header h2 {
            margin: 0;
            color: #333;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .modal-footer {
            padding: 15px;
            border-top: 1px solid #eee;
            background: #f9f9f9;
            display: flex;
            justify-content: flex-end;
        }

        .close-btn {
            background: #ddd;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #ccc;
        }

        .primary-btn {
            background: #667eea;
        }

        .primary-btn:hover {
            background: #764ba2;
        }

        /* 论文链接列表样式 */
        .paper-link-item {
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .paper-link-info {
            flex: 1;
            min-width: 0;
        }

        .paper-title {
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .paper-meta {
            font-size: 12px;
            color: #999;
        }

        .paper-link-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            margin-left: 10px;
            transition: background 0.2s;
        }

        .paper-link-btn:hover {
            background: #764ba2;
        }

        /* 周期之星样式 */
        .star-badge {
            position: absolute;
            background: #ff6b6b;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            z-index: 10;
            transition: background 0.2s;
        }

        .star-badge:hover {
            background: #ff5252;
        }

        .period-date-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 论文数据趋势分析</h1>
        <p class="subtitle">按周为一个周期（周一~周日），展示category按upvotes加权的聚类结果</p>

        <div class="controls">
            <div class="control-group">
                <label for="periodDays">周期配置：</label>
                <select id="periodDays" onchange="changePeriod()">
                    <option value="1">1天（按日期分组）</option>
                    <option value="7" selected>周周期（周一~周日）</option>
                    <option value="30">30天周期</option>
                </select>
            </div>
            <div class="control-group">
                <label for="aggregationType">聚合方式：</label>
                <select id="aggregationType">
                    <option value="sum">总点赞数（和）</option>
                    <option value="avg">平均点赞数</option>
                    <option value="count">论文数量</option>
                </select>
            </div>
            <div class="control-group">
                <label for="topN">显示前N个Category：</label>
                <input type="number" id="topN" min="1" max="20" value="10" style="width: 60px;">
            </div>
            <button onclick="toggleCategorySelector()" style="margin-left: auto;">📋 选择Category</button>
            <button onclick="showDetailsPanel()">📑 查看所有论文链接</button>
            <button onclick="refreshData()">🔄 刷新数据</button>
        </div>

        <!-- Category选择器 -->
        <div id="categorySelector" class="category-selector" style="display: none;">
            <div class="category-selector-header">
                <span>选择显示的Category</span>
                <button class="close-btn" onclick="toggleCategorySelector()">✕</button>
            </div>
            <div class="category-selector-content" id="categorySelectorContent"></div>
            <div class="category-selector-footer">
                <button onclick="selectAllCategories()">全选</button>
                <button onclick="deselectAllCategories()">全不选</button>
                <button onclick="toggleCategorySelector()" class="primary-btn">完成</button>
            </div>
        </div>

        <div id="error"></div>
        <div id="loading" class="loading" style="display: none;">
            <span class="spinner"></span>
            <span>正在加载数据中...</span>
            <p style="font-size: 12px; margin-top: 10px; color: #999;">
                💡 提示：打开浏览器开发者工具（F12 → Console）查看加载进度
            </p>
        </div>

        <div id="content" style="display: none;">
            <div class="stats" id="statsContainer"></div>

            <div class="chart-container">
                <div class="chart-title">按5天周期的Category加权趋势</div>
                <canvas id="trendChart"></canvas>
            </div>

            <div class="legend-grid" id="legendGrid"></div>

            <div class="details-section">
                <div class="details-title">📋 各周期详细数据</div>
                <div id="detailsContainer"></div>
            </div>
        </div>
    </div>

    <!-- 详情页Modal -->
    <div id="detailsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📑 所有论文链接</h2>
                <button class="close-btn" onclick="closeDetailsPanel()">✕</button>
            </div>
            <div class="modal-body" id="detailsModalBody"></div>
            <div class="modal-footer">
                <button onclick="closeDetailsPanel()" class="primary-btn">关闭</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
